<div class="fixed inset-0 bg-overlay z-modal flex items-center justify-center" (click)="cancelled.emit()">
  <div class="bg-panel rounded shadow-2xl w-540px max-h-70vh flex flex-col overflow-hidden" (click)="$event.stopPropagation()">

    <!-- Header -->
    <div class="flex items-center justify-between px-4 py-3 border-bottom">
      <span class="font-semibold text-sm">Select Folder</span>
      <button class="btn btn-ghost p-2" (click)="cancelled.emit()">×</button>
    </div>

    <!-- Current path -->
    <div class="px-4 py-2 bg-panel-dark border-bottom font-mono text-xs text-muted truncate" title="{{ currentPath() }}">
      {{ currentPath() || '…' }}
    </div>

    <!-- Filter input -->
    <div class="px-2 py-2 border-bottom">
      <input
        #searchInput
        class="field"
        placeholder="Filter folders… (Ctrl+Enter to select current)"
        [value]="filterText()"
        (input)="onFilterInput($event)"
        (keydown)="onKeydown($event)">
    </div>

    <!-- Entry list -->
    <div class="overflow-y-auto flex-grow p-2" #listContainer>
      @if (loading()) {
        <div class="text-muted text-sm p-4" style="text-align:center">Loading…</div>
      } @else if (error()) {
        <div class="text-sm p-4" style="text-align:center; color:#f87171">{{ error() }}</div>
      } @else {
        @for (entry of filteredEntries(); track entry.path) {
          <button
            class="btn w-full flex items-center gap-2 bg-panel-hover"
            [style.background-color]="isActive(entry) ? '#334155' : ''"
            style="text-align:left"
            [attr.data-nav-path]="entry.path"
            (mousedown)="$event.preventDefault()"
            (click)="browse(entry.path)">
            @if (entry.name === '..') {
              <span class="text-muted">↑</span>
              <span class="text-muted text-sm">..</span>
            } @else {
              <span style="color:#f59e0b; flex-shrink:0">📁</span>
              <span class="text-sm truncate">{{ entry.name }}</span>
            }
          </button>
        }
        @if (filteredEntries().length === 0) {
          <div class="text-muted text-sm p-4" style="text-align:center">
            {{ filterText() ? 'No matches' : 'No subdirectories' }}
          </div>
        }
      }
    </div>

    <!-- Footer -->
    <div class="flex items-center justify-between gap-2 px-4 py-3 border-top">
      <span class="font-mono text-xs text-muted truncate flex-grow" title="{{ currentPath() }}">{{ currentPath() }}</span>
      <div class="flex gap-2 flex-shrink-0">
        <button class="btn btn-ghost" (click)="cancelled.emit()">Cancel</button>
        <button class="btn btn-primary" [disabled]="loading()" (click)="select()">Select this folder</button>
      </div>
    </div>

  </div>
</div>
