<!-- Page header -->
<div class="flex items-center gap-3 p-4 border-bottom">
  <button class="btn btn-ghost" (click)="location.back()">← Back</button>
  <h1 class="font-semibold m-0">Settings</h1>
</div>

<!-- Tab bar -->
<div class="flex border-bottom px-4 gap-0">
  <button class="tab-btn" [class.tab-btn-active]="activeTab() === 'prompts'" (click)="setTab('prompts')">
    System Prompts
  </button>
  <button class="tab-btn" [class.tab-btn-active]="activeTab() === 'agents'" (click)="setTab('agents')">
    Agents
  </button>
</div>

<!-- Tab content -->
<div class="overflow-y-auto flex-grow p-4 bg-panel-dark">
  @if (activeTab() === 'prompts') {
    <app-prompts-list />
  }
  @if (activeTab() === 'agents') {
    <app-agents-list />
  }
</div>
