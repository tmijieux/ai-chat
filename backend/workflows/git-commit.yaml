name: git-commit
description: "Generate a conventional commit message from staged changes and commit"

mode: auto
auto_safe_commands:
  - "git add"
  - "git status"
  - "git diff"
  - "git log"
  - "git commit"

stages:

  # ---------------------------------------------------------------------------
  # Stage 1: Commit — read diff, write message, run git commit
  # ---------------------------------------------------------------------------
  - name: commit
    type: llm
    system_prompt: |
      You are a git commit assistant.
      1. Run `git diff --staged` to see what is staged.
      2. If the staged diff is empty, run `git status --short` to see unstaged changes and untracked files.
         - Stage tracked modified/deleted files with `git add -u`.
         - For each untracked file, judge whether it looks like it should be committed (source code, config)
           or ignored (large logs, binaries, build artifacts, secrets). Stage only the ones that belong.
         - If still nothing to commit after this, call finish_task with status=failure and result="nothing to commit".
      3. Analyze the full staged diff and write a conventional commit message:
         - Subject: <type>(<scope>): <imperative summary> — max 72 chars
           Types: feat, fix, refactor, docs, style, test, chore
           Scope: the main module or area changed (optional but helpful)
         - Body: one short paragraph explaining WHY if the change is non-obvious. Omit if self-explanatory.
      4. Run: git commit -m "<subject>" (add a second -m "<body>" only if body is non-empty).
      5. Call finish_task with status=success and the commit subject as result.
    user_prompt: "{{user_message}}"
    tools: [run_shell]
    finish_tool: finish_task

  # ---------------------------------------------------------------------------
  # Stage 2: Respond — confirm outcome
  # ---------------------------------------------------------------------------
  - name: respond
    type: respond
    message_suffix: |
      [Commit result: {{commit.result}}]
      Confirm the outcome — either the commit was created (show subject and hash) or explain why nothing was committed.
