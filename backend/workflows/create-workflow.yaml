name: create-workflow
description: "Design and write a new workflow YAML file for the backend/workflows/ directory"

stages:
  - name: explore
    prompt: |
      You are a codebase explorer. Your goal is to understand the workflow system so you can help design a new one.
      Explore these things:
      1. Existing workflow YAML files in backend/workflows/ (to understand conventions and examples)
      2. Available tools: read backend/agent/tools/__init__.py to see TOOL_REGISTRY keys
      3. Available built-in finish tools: read backend/agent/finish_tools.py
      4. Read CONTEXT.md for domain language and project conventions
      Use glob_files, read_file, and grep_files. When done, call finish_explore with the relevant locations.
    tools: [read_file, read_file_range, glob_files, grep_files, list_directory]
    finish_tool: finish_explore
    max_iterations: 6
    inject_turn_reminders: true

  - name: design
    prompt: |
      You are a workflow designer. Based on the user's request and the codebase context from the explore stage (in Prior stage results → explore), design a complete workflow YAML definition.
      Think through:
      - What stages are needed, and in what order?
      - What tools does each stage need?
      - Which built-in finish_tool captures each stage's output? (finish_explore, finish_task, finish_plan, finish_augmentation, finish_critique, finish_verify)
      - Does any stage need a custom finish_tool defined in the finish_tools section?
      - What system prompt in the YAML prompt field guides each stage's behavior?
      Call finish_design with the complete workflow YAML as a string and design notes explaining your choices.
    tools: []
    finish_tool: finish_design
    max_iterations: 3

  - name: write
    prompt: |
      You are a file writer. The design stage produced a workflow_yaml string (in Prior stage results → design → workflow_yaml).
      Write that YAML content to backend/workflows/<slug>.yaml where <slug> is a kebab-case identifier derived from the workflow_name field (also in Prior stage results → design → workflow_name).
      After writing, call finish_task with the file path you wrote to and a confirmation message.
    tools: [write_file]
    finish_tool: finish_task
    max_iterations: 3

finish_tools:
  finish_design:
    description: "Submit the complete workflow design as a YAML string ready to be written to disk"
    parameters:
      workflow_name:
        type: string
        description: "The workflow name value (used for the filename slug)"
      workflow_yaml:
        type: string
        description: "The complete YAML content of the new workflow definition"
      notes:
        type: string
        description: "Design notes explaining the stage choices and any tradeoffs"
